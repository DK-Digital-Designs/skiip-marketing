<script type="text/babel" data-plugins="transform-react-jsx-source" data-filename="inline-2">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "view": "attendee",
  "attendeeScreen": "home",
  "showPhoneFrame": true
}/*EDITMODE-END*/;

// ── Tweaks state ──────────────────────────────────────────────────────────────
function useTweaks() {
  const [tweaks, setTweaks] = React.useState(() => {
    try {
      const saved = localStorage.getItem('skiip_tweaks');
      return saved ? { ...TWEAK_DEFAULTS, ...JSON.parse(saved) } : TWEAK_DEFAULTS;
    } catch { return TWEAK_DEFAULTS; }
  });
  const update = (key, val) => {
    setTweaks(prev => {
      const next = { ...prev, [key]: val };
      localStorage.setItem('skiip_tweaks', JSON.stringify(next));
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
      return next;
    });
  };
  return [tweaks, update];
}

// ── Phone frame ───────────────────────────────────────────────────────────────
function PhoneFrame({ children, show }) {
  if (!show) {
    return (
      <div style={{ width: 390, height: 680, borderRadius: 0, overflow: 'hidden', position: 'relative' }}>
        {children}
      </div>
    );
  }
  return (
    <div style={{
      width: 390, height: 780,
      background: '#0A0A12',
      borderRadius: 52,
      boxShadow: '0 0 0 2px #1E2040, 0 0 0 4px #0A0A12, 0 40px 100px rgba(0,0,0,0.7), 0 0 60px rgba(139,92,246,0.12)',
      position: 'relative', overflow: 'hidden', flexShrink: 0,
    }}>
      {/* Notch */}
      <div style={{
        position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 34, background: '#0A0A12',
        borderRadius: '0 0 22px 22px', zIndex: 100,
      }} />
      {/* Status bar */}
      <div style={{
        position: 'absolute', top: 0, left: 0, right: 0, height: 50,
        display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between',
        padding: '0 28px 8px', zIndex: 99, pointerEvents: 'none',
      }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,0.8)', letterSpacing: '0.02em' }}>9:41</span>
        <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
          <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.7)' }}>●●●●</span>
          <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.7)' }}>WiFi</span>
          <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.7)' }}>⚡88%</span>
        </div>
      </div>
      {/* Screen area */}
      <div style={{ position: 'absolute', top: 50, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}>
        {children}
      </div>
      {/* Home indicator */}
      <div style={{
        position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)',
        width: 120, height: 5, background: 'rgba(255,255,255,0.3)',
        borderRadius: 99, zIndex: 100,
      }} />
      {/* Side buttons */}
      <div style={{ position: 'absolute', right: -3, top: 150, width: 3, height: 60, background: '#1E2040', borderRadius: '0 3px 3px 0' }} />
      <div style={{ position: 'absolute', left: -3, top: 130, width: 3, height: 40, background: '#1E2040', borderRadius: '3px 0 0 3px' }} />
      <div style={{ position: 'absolute', left: -3, top: 184, width: 3, height: 40, background: '#1E2040', borderRadius: '3px 0 0 3px' }} />
      <div style={{ position: 'absolute', left: -3, top: 240, width: 3, height: 40, background: '#1E2040', borderRadius: '3px 0 0 3px' }} />
    </div>
  );
}

// ── Screen nav pills ──────────────────────────────────────────────────────────
function ScreenPills({ screens, active, onSelect }) {
  return (
    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'center' }}>
      {screens.map(s => (
        <button key={s.id} onClick={() => onSelect(s.id)} style={{
          padding: '6px 14px', borderRadius: 99, border: 'none', cursor: 'pointer',
          background: active === s.id ? '#8B5CF6' : 'rgba(255,255,255,0.07)',
          color: active === s.id ? '#fff' : 'rgba(255,255,255,0.5)',
          fontSize: 12, fontWeight: 600, letterSpacing: '0.02em',
          transition: 'all 0.15s',
          boxShadow: active === s.id ? '0 0 16px rgba(139,92,246,0.5)' : 'none',
        }}>{s.label}</button>
      ))}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
const attendeeScreens = [
  { id: 'home',   label: 'Home' },
  { id: 'menu',   label: 'Menu' },
  { id: 'cart',   label: 'Cart' },
  { id: 'status', label: 'Status' },
  { id: 'pickup', label: 'Pickup' },
];

function App() {
  const [tweaks, updateTweak] = useTweaks();
  const [editMode, setEditMode] = React.useState(false);
  const [activeAttendeeScreen, setActiveAttendeeScreen] = React.useState(tweaks.attendeeScreen || 'home');

  // Tweaks panel toggle
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setView = (v) => updateTweak('view', v);

  return (
    <div style={{
      width: '100vw', height: '100vh',
      background: 'radial-gradient(ellipse at 60% 20%, #1a0d3a 0%, #080C22 60%)',
      display: 'flex', flexDirection: 'column', overflow: 'hidden',
    }}>
      {/* Top bar */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '14px 32px', flexShrink: 0,
        borderBottom: '1px solid rgba(255,255,255,0.06)',
      }}>
        {/* Logo */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{
            width: 32, height: 32, borderRadius: 9,
            background: 'linear-gradient(135deg, #8B5CF6, #22D3EE)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 16, fontWeight: 900, color: '#fff',
          }}>S</div>

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

            <div>

};
